services:
  mongodb:
    build:
      context: ./mongodb
      dockerfile: Dockerfile
    image: Kranthireddy152/mongodb:1.0.0
    container_name: mongodb
  catalogue:
    build:
      context: ./catalogue
    image: Kranthireddy152/catalogue:1.0.0  
    container_name: catalogue
    depends_on: 
    - mongodb
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: Kranthireddy152/frontend:1.0.0
    container_name: frontend
    ports: 
    - "80:80"
    depends_on: 
    - catalogue
    - user
    - cart
    - shipping
  user:
    build:
      context: ./user
    image: Kranthireddy152/user:1.0.0  
    container_name: user
    depends_on: 
    - redis
  cart:
    build:
      context: ./cart
    image: Kranthireddy152/cart:1.0.0  
    container_name: cart
    depends_on:
    - redis
    - catalogue
  redis:
    image: redis:7.0
    container_name: redis
  mysql:
    build:
      context: ./mysql
    image: Kranthireddy152/mysql:1.0.0  
    container_name: mysql 
  shipping:
    build:
      context: ./shipping
    image: Kranthireddy152/shipping:1.0.0  
    container_name: shipping
    depends_on: 
    - mysql   
    - cart 
networks:
  default:
    driver: bridge
    name: roboshop
    external: false # if true, we need to create network manually